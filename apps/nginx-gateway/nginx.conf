events {
    worker_connections 65535;
    multi_accept on;
    use epoll;  # Linux
}

http {
    access_log off;
    
    upstream backend {
        server 127.0.0.1:9000;
    }

    server {
        listen 8080;
        
        location / {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_request_buffering off;
            proxy_buffering off;
        }
    }
}
