version: '3.8'
services:
  upstream:
    build: ../apps/upstream-echo
    ports: ["9000:9000"]

  gateway-rust:
    build: ../apps/gateway-rust
    ports: ["8081:8080"]
    environment:
      UPSTREAM_BASE_URL: http://upstream:9000
      GATEWAY_MODE: streaming
    depends_on: [upstream]

